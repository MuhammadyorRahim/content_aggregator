name: Debug Server

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Fix and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          command_timeout: 10m
          script: |
            set -e
            cd /app
            echo "=== Resetting local changes and pulling ==="
            git checkout -- .
            git clean -fd
            git pull --ff-only origin main
            echo "=== Running deploy ==="
            bash /app/deploy/deploy.sh
            echo "=== PM2 STATUS ==="
            pm2 status
            echo "=== PORT CHECK ==="
            ss -tlnp | grep 3000 || echo "PORT 3000 NOT LISTENING"
